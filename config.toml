[app]
name = "tilt-detection-service"
version = "1.0.0"
debug = false
api_prefix = "/api/v1"

[server]
host = "0.0.0.0"
port = 8881
workers = 1

[gpu]
enabled = true
device_id = "0"
require_gpu = true

[detection]
tilt_threshold = 1.5
min_line_length_ratio = 0.1
min_valid_lines = 5
trim_start_ratio = 0.2
trim_end_ratio = 0.8
gaussian_kernel_size = 5
canny_threshold1 = 50
canny_threshold2 = 150
horizontal_angle_min = -30
horizontal_angle_max = 30
vertical_angle_min = 60
vertical_angle_max = 120

[logging]
level = "INFO"
log_dir = "logs"
access_log = "access.log"
app_log = "app.log"
max_bytes = 10485760
backup_count = 10

[runtime]
max_image_bytes = 10485760
