services:
  tilt-api:
    build:
      context: .
      args:
        PIP_INSTALL_MODE: ${PIP_INSTALL_MODE:-online}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_ARGS: ${PIP_EXTRA_ARGS:---retries 10 --timeout 120}
    container_name: tilt-api
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: ${GPU_DEVICE:-0}
      CUDA_VISIBLE_DEVICES: ${GPU_DEVICE:-0}
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
    expose:
      - "8881"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - ${GPU_DEVICE:-0}
              capabilities:
                - gpu

  nginx:
    image: nginx:1.25-alpine
    container_name: tilt-nginx
    restart: unless-stopped
    depends_on:
      - tilt-api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8881:80"
